<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AES256 加解密</title>
</head>
<body>
    <input type="password" id="pwd" placeholder="密码"><br><br>
    <input type="file" id="file"><br><br>
    <button onclick="go(true)">加密</button>
    <button onclick="go(false)">解密</button>

    <script>
        async function deriveKey(password) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw", enc.encode(password), { name: "PBKDF2" },
                false, ["deriveKey"]
            );
            return crypto.subtle.deriveKey({
                name: "PBKDF2",
                salt: enc.encode("aes-salt"),
                iterations: 100000,
                hash: "SHA-256"
            }, keyMaterial, { name: "AES-GCM", length: 256 }, true,
                ["encrypt", "decrypt"]);
        }

        async function go(encrypt) {
            const pwd = document.getElementById("pwd").value;
            const file = document.getElementById("file").files[0];
            if (!pwd || !file) return alert("填密码+选文件");

            const key = await deriveKey(pwd);
            const data = await file.arrayBuffer();
            let result, name;

            if (encrypt) {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const cipher = await crypto.subtle.encrypt(
                    { name: "AES-GCM", iv }, key, data
                );
                const out = new Uint8Array(iv.length + cipher.byteLength);
                out.set(iv, 0);
                out.set(new Uint8Array(cipher), iv.length);
                result = out;
                name = file.name + ".enc";
            } else {
                const buf = new Uint8Array(data);
                const iv = buf.slice(0, 12);
                const cipher = buf.slice(12);
                result = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv }, key, cipher
                );
                name = file.name.replace(/\.enc$/, "") || "out";
            }

            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([result]));
            a.download = name;
            a.click();
        }
    </script>
</body>
</html>
