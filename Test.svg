<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgTile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <linearGradient id="folderBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338CA" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>

    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <linearGradient id="folderFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="50%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#3730A3" />
    </linearGradient>

    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <filter id="fluentShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.2" />
    </filter>

    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="16" dy="24" stdDeviation="32" flood-color="#022C22" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgTile)" />

  <rect x="280" y="180" width="360" height="200" rx="32" fill="url(#folderBack)" />
  <rect x="240" y="260" width="600" height="600" rx="40" fill="url(#folderBack)" />

  <g filter="url(#fluentShadow)">
    <rect x="360" y="160" width="460" height="600" rx="24" fill="url(#paper)" />
    <rect x="362" y="162" width="456" height="596" rx="22" fill="none" stroke="#FFFFFF" stroke-width="4" />
    
    <rect x="420" y="260" width="240" height="24" rx="12" fill="#CBD5E1" />
    <rect x="420" y="340" width="340" height="24" rx="12" fill="#E2E8F0" />
    <rect x="420" y="420" width="280" height="24" rx="12" fill="#CBD5E1" />
    <rect x="420" y="500" width="160" height="24" rx="12" fill="#E2E8F0" />
  </g>

  <g filter="url(#fluentShadow)">
    <rect x="180" y="480" width="760" height="400" rx="40" fill="url(#folderFront)" />
    <rect x="184" y="484" width="752" height="392" rx="36" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.3" />
    <rect x="180" y="480" width="760" height="200" rx="40" fill="url(#paper)" opacity="0.05" />
  </g>

  <g filter="url(#badgeShadow)">
    <rect x="120" y="380" width="360" height="360" rx="80" fill="url(#badge)" />
    <rect x="124" y="384" width="352" height="352" rx="76" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.4" />
    
    <path d="M 250 540 v -40 c 0 -28 22 -50 50 -50 s 50 22 50 50 v 40" fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" />
    <rect x="210" y="540" width="180" height="120" rx="28" fill="#FFFFFF" />
    <circle cx="300" cy="588" r="16" fill="url(#badge)" />
    <path d="M 300 600 v 24" fill="none" stroke="url(#badge)" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>